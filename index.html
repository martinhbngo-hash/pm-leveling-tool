<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Researcher Intelligence Hub</title>
<style>
  :root {
    --bg: #0a0a0b;
    --card-bg: #141416;
    --primary: #e5e5e1; 
    --secondary: #27272a; 
    --accent: #d4d4d8; 
    --warning: #facc15;
    --text-main: #f4f4f5;
    --text-dim: #71717a;
    --border: #262626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
    padding: 1rem;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 850px; margin: 0 auto; }
  
  header { margin: 1.5rem 0 2.5rem; text-align: left; border-left: 1px solid var(--primary); padding-left: 1.5rem; }
  header h1 { font-size: 24px; font-weight: 500; letter-spacing: -0.05em; color: var(--primary); }
  header p { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }

  .tabs { 
    display: flex; gap: 4px; margin-bottom: 2rem; padding: 4px;
    background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border);
    overflow-x: auto;
  }
  
  .tab-btn {
    flex: 1; padding: 12px; background: transparent; border: none;
    border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; 
    color: var(--text-dim); transition: 0.2s; white-space: nowrap;
  }

  .tab-btn.active { background: var(--secondary); color: var(--primary); }

  .tab-content {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 1.5rem; display: none;
    box-shadow: 0 40px 100px -20px rgba(0,0,0,0.7);
  }
  
  .tab-content.active { display: block; }

  .field { margin-bottom: 1.2rem; }
  label { font-size: 10px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; display: block; text-transform: uppercase; }
  
  select, textarea {
    width: 100%; padding: 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 16px; color: var(--text-main);
  }
  
  .btn-primary { 
    background: var(--primary); color: var(--bg); border: none; 
    padding: 16px; border-radius: 10px; font-weight: 700; 
    cursor: pointer; width: 100%; font-size: 14px; margin-top: 0.5rem;
  }

  .result-card { margin-top: 1.5rem; padding: 20px; border-radius: 14px; background: var(--bg); border: 1px solid var(--border); }
  
  .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
  .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
  .stat-val { font-size: 18px; font-weight: 600; color: var(--primary); display: block; }
  .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

  .alert-box { 
    margin-top: 15px; padding: 12px; border-radius: 8px; 
    background: rgba(250, 204, 21, 0.05); border: 1px solid rgba(250, 204, 21, 0.2);
    font-size: 12px; color: var(--warning); display: flex; gap: 10px;
  }

  .nuance-box { border-top: 1px solid var(--border); margin-top: 15px; padding-top: 15px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Researcher Hub</h1>
    <p>Market Intelligence & Strategy</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" onclick="openTab(event, 'tab-intel')">Market Intel</button>
    <button class="tab-btn" onclick="openTab(event, 'tab-leveling')">Calibration</button>
    <button class="tab-btn" onclick="openTab(event, 'tab-sourcing')">Sourcing</button>
    <button class="tab-btn" onclick="openTab(event, 'tab-outreach')">Strategy</button>
  </nav>

  <!-- MARKET INTEL -->
  <section id="tab-intel" class="tab-content active">
    <div class="field">
      <label>Domain Focus</label>
      <select id="intel-domain" onchange="updateIntel()">
        <option value="">Select Domain—</option>
        <option value="ai">AI / Machine Learning</option>
        <option value="product">Product Management</option>
        <option value="infra">Infrastructure</option>
      </select>
    </div>
    <div id="intel-results" style="display:none;">
        <div class="insight-grid">
            <div class="stat-card"><span class="stat-label">Scarcity</span><span class="stat-val" id="scarcity-val">-</span></div>
            <div class="stat-card"><span class="stat-label">Tenure</span><span class="stat-val" id="tenure-val">-</span></div>
        </div>
        <div class="alert-box"><span>⚠</span><span id="market-alert"></span></div>
    </div>
  </section>

  <!-- CALIBRATION (Leveling) -->
  <section id="tab-leveling" class="tab-content">
    <div class="field">
      <label>Source Company</label>
      <select id="compA" onchange="updateLevels()"><option value="">Select Company—</option></select>
    </div>
    <div class="field">
        <label>Reported Title</label>
        <select id="levelA" onchange="calculateMapping()"><option value="">Select company first—</option></select>
    </div>
    <div id="level-result" class="result-card" style="display:none;">
        <div style="text-align: center;">
            <div class="stat-label">Calibrated Match</div>
            <div class="stat-val" id="res-val-meta" style="font-size: 28px;">-</div>
        </div>
        <div class="nuance-box">
            <strong>Nuance:</strong> <span id="nuance-text"></span>
        </div>
    </div>
  </section>

  <!-- SOURCING -->
  <section id="tab-sourcing" class="tab-content">
    <textarea id="jd-input" rows="5" placeholder="Paste Job Description..."></textarea>
    <button class="btn-primary" onclick="runSourcing()">Map Talent Clusters</button>
    <div id="sourcing-result" class="result-card" style="display:none;">
        <div id="sourcing-content"></div>
    </div>
  </section>

  <!-- STRATEGY -->
  <section id="tab-outreach" class="tab-content">
    <textarea id="profile-snippet" rows="5" placeholder="Paste Profile Summary..."></textarea>
    <button class="btn-primary" onclick="generateStrategy()">Synthesize Strategy</button>
    <div id="outreach-result" class="result-card" style="display:none;">
        <div id="strategy-list"></div>
    </div>
  </section>
</div>

<script>
/* THE INTELLIGENCE DATA */
const levelMap = {
  "Google": ["APM","PM II","Senior PM","Staff PM","Group PM","Director of PM","VP of Product"],
  "Apple": ["New Grad PM","PM","Senior PM","Lead PM","Principal PM","Director of PM","VP of Product"],
  "Amazon": ["PM I","PM II","Senior PM","Principal PM","Sr. Principal PM","Director of PM","VP of Product"],
  "Microsoft": ["PM","PM II","Senior PM","Principal PM","Group PM","Director of PM","CVP / VP"],
  "Meta": ["IC3","IC4","IC5","IC6","IC7","D1","D2/VP"]
};

const metaLevels = ["IC3", "IC4", "IC5", "IC6", "IC7", "D1", "D2/VP"];

const marketData = {
    "ai": { scarcity: "Extreme", tenure: "1.8 yrs", alert: "High competition from OpenAI/Anthropic." },
    "product": { scarcity: "High", tenure: "2.6 yrs", alert: "Recent focus on technical PMs for Core Infra." },
    "infra": { scarcity: "Moderate", tenure: "3.2 yrs", alert: "Donor pool: Google Cloud and AWS." }
};

const nuances = [
    "Execution focus. Check for individual craft bar.",
    "Early scaling. Meta focuses on 'Influence without Authority' here.",
    "High complexity. Validate experience with massive user-base scale.",
    "Strategic leadership. Check for 'Org Impact' vs pure headcount.",
    "Organizational scope. May map to high-level IC or M2 roles.",
    "Strategic Visionary. High scrutiny on long-term roadmapping.",
    "Executive alignment required for D2+ pivots."
];

/* APP LOGIC */
function init() {
  const compSel = document.getElementById("compA");
  if(!compSel) return;
  Object.keys(levelMap).sort().forEach(c => {
    let opt = document.createElement("option");
    opt.value = c; opt.textContent = c;
    compSel.appendChild(opt);
  });
}

function openTab(evt, tabId) {
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
  evt.currentTarget.classList.add("active");
}

function updateIntel() {
    const d = document.getElementById("intel-domain").value;
    if(!d) return;
    document.getElementById("intel-results").style.display = "block";
    document.getElementById("scarcity-val").innerText = marketData[d].scarcity;
    document.getElementById("tenure-val").innerText = marketData[d].tenure;
    document.getElementById("market-alert").innerText = marketData[d].alert;
}

function updateLevels() {
  const co = document.getElementById("compA").value;
  const levSel = document.getElementById("levelA");
  levSel.innerHTML = '<option value="">Select Level—</option>';
  if(levelMap[co]) {
    levelMap[co].forEach((l, i) => {
      let opt = document.createElement("option");
      opt.value = i; opt.textContent = l;
      levSel.appendChild(opt);
    });
  }
}

function calculateMapping() {
    const idx = parseInt(document.getElementById("levelA").value);
    if (isNaN(idx)) return;
    document.getElementById("level-result").style.display = "block";
    document.getElementById("res-val-meta").innerText = metaLevels[idx] || "D2+";
    document.getElementById("nuance-text").innerText = nuances[idx] || nuances[nuances.length-1];
}

function runSourcing() {
    document.getElementById("sourcing-result").style.display = "block";
    document.getElementById("sourcing-content").innerHTML = "Analysis complete. Target identified: <b>Tier 1 Tech Alumni (2023-2024 cohorts)</b>.";
}

function generateStrategy() {
    document.getElementById("outreach-result").style.display = "block";
    document.getElementById("strategy-list").innerHTML = "• Highlight Meta's 'Builder' culture vs their current 'Maintainer' role.";
}

// Start the app
window.onload = init;
</script>
</body>
</html>
