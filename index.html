<!-- Inside the Leveling Tab Content -->
<div id="tab-leveling" class="tab-content">
  <!-- ... previous company/level selectors ... -->

  <div id="level-result" class="result-card" style="display:none;">
    <div style="text-align: center; margin-bottom: 20px;">
        <div class="tag" id="res-name-a">Source</div>
        <div class="val" id="res-val-a">-</div>
        <div style="margin: 10px 0; color: var(--border);">↓</div>
        <div class="tag">Internal Equivalent</div>
        <div class="val" id="res-val-meta" style="color: #fff; text-decoration: underline; text-underline-offset: 4px;">-</div>
    </div>

    <!-- NEW NUANCE SECTION -->
    <div style="border-top: 1px solid var(--border); padding-top: 15px;">
        <label style="color: var(--accent); font-size: 9px;">Calibration Nuance & Reasoning</label>
        <p id="nuance-text" style="font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-top: 8px; font-style: italic;">
            Select a level to see mapping logic.
        </p>
    </div>
  </div>
</div>

<script>
// Logic for the Nuance Engine
const nuances = {
  "early": "Scope is likely execution-heavy. At Meta, this requires high 'craft' bar and individual delivery without much infra support.",
  "mid": "The 'Sweet Spot'. Likely manages a feature set. Meta calibration focuses on 'Influence without Authority' at this stage.",
  "senior": "Complexity Gap: A 'Senior' at many firms lacks the massive scale of Meta's user base. Expect high scrutiny on technical system design.",
  "leadership": "Title Inflation Alert: Smaller firms grant 'Director' titles for scope that maps to IC6/IC7 here. Focus on their 'Org Impact' vs. headcount.",
  "executive": "Strategic Alignment: Mapping depends heavily on their experience with high-velocity product shipping vs. pure people management."
};

function calculateMapping() {
    const idx = parseInt(document.getElementById("levelA").value);
    const co = document.getElementById("compA").value;
    if (isNaN(idx)) return;
    
    document.getElementById("level-result").style.display = "block";
    document.getElementById("res-name-a").innerText = co;
    const sourceLevel = levelMap[co][idx];
    document.getElementById("res-val-a").innerText = sourceLevel;
    
    const internalLevel = metaLevels[idx] || "D2+";
    document.getElementById("res-val-meta").innerText = internalLevel;

    // Nuance Attribution
    let nKey = "mid";
    if (idx <= 1) nKey = "early";
    else if (idx === 2) nKey = "senior";
    else if (idx >= 3 && idx <= 5) nKey = "leadership";
    else if (idx > 5) nKey = "executive";

    document.getElementById("nuance-text").innerText = nuances[nKey];
}
</script>
